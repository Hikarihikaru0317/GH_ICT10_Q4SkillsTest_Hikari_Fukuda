<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
        <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
        <title>Attendance Tracker</title>
        <py-config>
            packages = ['numpy', 'matplotlib' ]
            plugins = ["!error"]
        </py-config>
        <style>
            body {
                background-color: #7e2046;
             
            }

            .card {
                background-color: white;
                padding: 20px;
                border-radius: 5px;
                width: 300px;
                float: left;
                margin-right: 50px;
                margin-top: 150px;
            }

            #graph-panel {
                margin-left: 700px;
                margin-top: 80px;
                height: 400px;
            }

            .progress-bar {
                height: 8px;
                background-color: #60d0a3;
                border-radius: 15px;
                max-width: 300px;
                width: 0%;
                transition: width 0.6s ease;
            }

            .button {
                background-color: #7e2046;
                color: white;
                padding: 12px 20px;
                border: none;
                border-radius: 5px;
                font-size: 16px;
                cursor: pointer;
                font-weight: bold;
                transition: background-color 0.3s ease;
                width: 100%;
                margin-top: 10px;
            }

            .button:hover {
                background-color: #5a1533;
            }

            input[type="button"] {
                background-color: #204f7e;
                color: white;
                padding: 12px 20px;
                border: none;
                border-radius: 5px;
                font-size: 16px;
                cursor: pointer;
                font-weight: bold;
                transition: background-color 0.3s ease;
                width: 100%;
                margin-top: 10px;
            }

            
        </style>
    </head>
    <body>
        <div class="container-navbar">
            <navbar class="navbar-one">
                <a href="https://ademata-10e.github.io/GH_ICT10_Q4Project/">Home</a>
                <a href="https://hikarihikaru0317.github.io/GH_ICT10_Q4SkillsTest_Hikari_Fukuda/">Attendance Tracker</a>
                <a href="https://hikarihikaru0317.github.io/GH_ICT10_Q4Seatwork2_Fukuda_Hikari/">Class List</a>
            </navbar>
        </div>
        <div class="card">
            <h1>Attendance Tracker</h1>

            <div>
                <label for="day-select">Select Day</label>
                <select id="day-select">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                </select>
            </div>

            <div>
                <label for="absences-input">Absences</label>
                <input type="number" id="absences-input" min="0" value="0">
            </div>

            <input type="button" py-click="submit_attendance" value="Submit">

            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div id="graph-panel">
            <div id="output"></div>
        </div>
        <div><p align="center" style="background-color: #aa1275; color: white;">Aurelia De Mata | Hikari Fukuda - 10 Emerald | 2025-2026</p></div>
        <py-script src='main.py'></py-script>

    </body>
</html>
